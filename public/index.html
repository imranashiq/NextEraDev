<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <style>
    body { font-family: Arial, sans-serif; background:#121212; color:#f5f5f5; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .container { width:100%; max-width:700px; padding:24px; background:#1f1f1f; border-radius:16px; box-shadow:0 12px 30px rgba(0,0,0,.4); }
    h1 { margin-top:0; font-size:24px; }
    label { display:block; margin-bottom:8px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; font-size:.85rem; }
    input, textarea { width:100%; padding:16px 14px; margin-bottom:20px; border:1px solid #333; border-radius:8px; background:#262626; color:#e0e0e0; }
    textarea { min-height:140px; resize:vertical; }
    button { width:100%; padding:16px; border:none; border-radius:10px; background:#4f94ff; color:#fff; font-size:1rem; cursor:pointer; }
    button:hover { background:#3e7ce0; }
    .message { margin-top:16px; padding:14px 16px; border-radius:8px; background:#212121; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Us</h1>
    <form id="contact-form">
      <label for="name">Name*</label>
      <input id="name" name="name" type="text" placeholder="Name" required />

      <label for="email">Email*</label>
      <input id="email" name="email" type="email" placeholder="Email" required />

      <label for="phone">Phone*</label>
      <input id="phone" name="phone" type="text" placeholder="Phone Number" required />

      <label for="budget">Budget*</label>
      <input id="budget" name="budget" type="text" placeholder="Budget Range" required />

      <label for="services">Services*</label>
      <div style="margin-bottom:20px;">
        <input type="checkbox" id="web" name="services" value="Web Development" />
        <label for="web" style="display:inline; text-transform:none; font-weight:400; margin-right:15px;">Web Development</label>
        
        <input type="checkbox" id="mobile" name="services" value="Mobile App" />
        <label for="mobile" style="display:inline; text-transform:none; font-weight:400; margin-right:15px;">Mobile App</label>
        
        <input type="checkbox" id="design" name="services" value="UI/UX Design" />
        <label for="design" style="display:inline; text-transform:none; font-weight:400; margin-right:15px;">UI/UX Design</label>
        
        <input type="checkbox" id="consulting" name="services" value="Consulting" />
        <label for="consulting" style="display:inline; text-transform:none; font-weight:400;">Consulting</label>
      </div>

      <label for="message">Tell us a bit about your project*</label>
      <textarea id="message" name="message" placeholder="Brief Project Overview" required></textarea>

      <button type="submit">Submit</button>
    </form>
    <div id="response" class="message" style="display:none"></div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const responseDiv = document.getElementById('response');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      responseDiv.style.display = 'none';
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      
      // Handle services array from checkboxes
      const servicesCheckboxes = form.querySelectorAll('input[name="services"]:checked');
      data.services = Array.from(servicesCheckboxes).map(cb => cb.value);

      if (data.services.length === 0) {
        responseDiv.style.display = 'block';
        responseDiv.textContent = 'Please select at least one service.';
        responseDiv.style.color = '#ff8a8a';
        return;
      }

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await res.json();

        responseDiv.style.display = 'block';
        responseDiv.textContent = result.message || result.error;
        responseDiv.style.color = res.ok ? '#b3f0c1' : '#ff8a8a';

        if (res.ok) form.reset();
      } catch (error) {
        responseDiv.style.display = 'block';
        responseDiv.textContent = 'Server error. Please try again later.';
        responseDiv.style.color = '#ff8a8a';
      }
    });
  </script>
</body>
</html>
